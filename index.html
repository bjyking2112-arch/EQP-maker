<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소방 장비 QR 관리 시스템</title>
    <link rel="stylesheet" href="style.css">
    <!-- QR 코드 생성을 위한 외부 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🚨 장비 이력 관리 QR 생성기</h1>
            <p>장비 정보를 입력하여 개별 관리 QR을 생성하세요.</p>
        </header>

        <!-- 입력 영역 -->
        <section class="input-form card">
            <div class="input-grid">
                <div class="field">
                    <label>장비명</label>
                    <input type="text" id="itemName" placeholder="예: 공기호흡기">
                </div>
                <div class="field">
                    <label>내용연수 (년)</label>
                    <input type="number" id="lifeSpan" placeholder="예: 5">
                </div>
                <div class="field">
                    <label>입력일자</label>
                    <input type="date" id="inputDate">
                </div>
                <div class="field">
                    <label>간단 메모</label>
                    <input type="text" id="memo" placeholder="예: A구역 보관 중">
                </div>
            </div>
            <button id="generate-btn" onclick="generateQR()">QR 코드 및 이력 생성</button>
        </section>

        <!-- 결과 테이블 영역 -->
        <section class="history-section card">
            <h2>📋 장비 등록 이력</h2>
            <div class="table-wrapper">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>QR</th>
                            <th>장비명</th>
                            <th>내용연수</th>
                            <th>입력일자</th>
                            <th>메모</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <!-- 데이터가 여기에 쌓입니다 -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- QR 확대 모달 -->
    <div id="qrModal" class="modal" onclick="closeModal()">
        <div id="modalContent"></div>
        <p>클릭하여 닫기</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
